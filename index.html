<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Mapping Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #EBEDDF; /* updated */
      color: #222;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      margin-bottom: 10px;
    }
    p {
      color: #555;
      margin-bottom: 30px;
    }
    .section {
      margin-bottom: 40px;
    }
    .section h2 {
      margin-bottom: 15px;
      border-bottom: 2px solid #D3A237; /* updated */
      padding-bottom: 8px;
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    a.button {
      display: inline-block;
      padding: 12px 18px;
      background: #AF0D21; /* updated */
      border: none;
      border-radius: 8px;
      text-decoration: none;
      color: white; /* updated */
      font-weight: 600;
    }
    a.button:hover {
      opacity: 0.85; /* subtle hover effect */
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Market Mapping Dashboard</h1>
    <p>Interactive trade area and spatial market maps by location.</p>

    <div class="section">
      <h2>Chicago</h2>
      <div class="buttons">
        <a class="button" href="chicago-river-north-map.html">Chicago River North</a>
      </div>
    </div>

    <div class="section">
      <h2>Georgia</h2>
      <div class="buttons">
        <a class="button" href="mall-of-georgia-map.html">Mall of Georgia</a>
      </div>
    </div>

    <div class="section">
      <h2>DC</h2>
      <div class="buttons">
        <a class="button" href="national-harbor-map.html">National Harbor</a>
      </div>
    </div>
  </div>
</body>
</html>
